<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f8fafc;
            background-image: linear-gradient(#e5e7eb 1px, transparent 1px), linear-gradient(90deg, #e5e7eb 1px, transparent 1px);
            background-size: 40px 40px;
            color: #1e293b;
            font-family: 'JetBrains Mono', monospace;
        }
        .glass-panel {
            background: rgba(20, 15, 42, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        #vpn-tunnel {
            position: absolute; height: 36px; top: 50%; left: 25%; width: 0;
            transform: translateY(-50%); background: rgba(37, 99, 235, 0.15);
            border-top: 2px solid #2563eb; border-bottom: 2px solid #2563eb;
            transition: width 1.2s ease-in-out; z-index: 1;
        }

        .data-particle {
            position: absolute; width: 6px; height: 2px; background: #60a5fa;
            box-shadow: 0 0 8px #60a5fa; animation: move-data 1s linear infinite;
        }

        @keyframes move-data {
            from { left: 0%; opacity: 1; }
            to { left: 100%; opacity: 0; }
        }

        .action-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.65rem;
            padding: 0.95rem 1.5rem;
            border-radius: 0.9rem;
            border: 0;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: #ffffff;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            box-shadow: 0 12px 28px rgba(37, 99, 235, 0.35);
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            box-shadow: 0 16px 34px rgba(37, 99, 235, 0.45);
        }

        .action-btn:active {
            transform: translateY(1px);
            box-shadow: 0 8px 18px rgba(37, 99, 235, 0.25);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col p-4 md:p-6">

    <header class="mb-6 border-l-4 border-blue-500 pl-6">
        <h1 class="text-2xl md:text-3xl font-black uppercase text-slate-900">Remote Security: <span class="text-blue-600">VPN Tunneling</span></h1>
        <p class="text-[9px] md:text-[10px] text-blue-900 uppercase tracking-[0.3em]">Module 07 // Virtual Private Network Architecture</p>
    </header>

    <main class="flex-grow grid grid-cols-1 lg:grid-cols-12 gap-6 items-center max-w-7xl mx-auto w-full">

        <div class="col-span-1 lg:col-span-8 relative h-[300px] md:h-[400px] flex items-center justify-between px-6 md:px-12 glass-panel rounded-3xl overflow-hidden order-1">
            <div id="vpn-tunnel"></div>

            <div class="z-10 text-center">
                <div class="text-4xl md:text-6xl mb-2">🏠</div>
                <h4 class="text-white text-[10px] font-bold uppercase">Manager Node</h4>
            </div>

            <div id="lock-icon" class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 opacity-0 transition-all duration-700 scale-50 z-20">
                <div class="bg-blue-600 p-2 md:p-3 rounded-xl shadow-[0_0_30px_rgba(37,99,235,0.5)] text-xl md:text-2xl text-white">🔒</div>
            </div>

            <div class="z-10 text-center">
                <div class="text-4xl md:text-6xl mb-2">🏢</div>
                <h4 class="text-white text-[10px] font-bold uppercase">TechNova HQ</h4>
            </div>
        </div>

        <div class="col-span-1 lg:col-span-4 space-y-4 order-2">
            <div class="glass-panel p-6 rounded-2xl border-slate-800">
                <h3 class="text-blue-400 text-xs font-bold uppercase mb-4 tracking-widest border-b border-blue-900/30 pb-2">Technical Brief</h3>
                <ul class="text-[11px] space-y-3 leading-relaxed text-slate-300">
                    <li class="flex gap-2">
                        <span class="text-blue-500">▹</span>
                        <span>Establishes a **secure tunnel** over the public internet.</span>
                    </li>
                    <li class="flex gap-2">
                        <span class="text-blue-500">▹</span>
                        <span>**AES-256 Encryption** ensures military-grade data **confidentiality**.</span>
                    </li>
                </ul>
            </div>

            <div class="glass-panel p-4 rounded-xl border-slate-800 bg-slate-950/50">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-[9px] uppercase font-bold text-slate-500">Status:</span>
                    <span id="status-text" class="text-[9px] font-bold text-red-500 uppercase">Disconnected</span>
                </div>
                <div class="w-full bg-slate-800 h-1 rounded-full overflow-hidden">
                    <div id="progress-bar" class="w-0 h-full bg-blue-500 transition-all duration-[1200ms]"></div>
                </div>
            </div>
        </div>
    </main>

    <div class="mt-6 md:mt-8 flex justify-center pb-6">
        <button id="connect-btn" onclick="startVPN()" class="action-btn w-full max-w-xs">
            Establish VPN Tunnel
        </button>
    </div>

    <script>
        function startVPN() {
            const tunnel = document.getElementById('vpn-tunnel');
            const lock = document.getElementById('lock-icon');
            const btn = document.getElementById('connect-btn');
            const status = document.getElementById('status-text');
            const progress = document.getElementById('progress-bar');

            btn.disabled = true;
            btn.style.opacity = '0.4';

            tunnel.style.width = '42%';
            progress.style.width = '100%';

            setTimeout(() => {
                lock.classList.replace('opacity-0', 'opacity-100');
                lock.classList.replace('scale-50', 'scale-100');
                status.innerText = "Active / Encrypted";
                status.classList.replace('text-red-500', 'text-emerald-500');

                setInterval(() => {
                    const p = document.createElement('div');
                    p.className = 'data-particle';
                    p.style.top = Math.random() * 20 + 8 + 'px';
                    tunnel.appendChild(p);
                    setTimeout(() => p.remove(), 1000);
                }, 200);
            }, 1200);
        }
    </script>
</body>
</html>
