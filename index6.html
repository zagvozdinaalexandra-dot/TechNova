<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f8fafc;
            background-image: linear-gradient(#e5e7eb 1px, transparent 1px), linear-gradient(90deg, #e5e7eb 1px, transparent 1px);
            background-size: 40px 40px;
            color: #1e293b;
            font-family: 'JetBrains Mono', monospace;
        }
        .glass-panel {
            background: rgba(199, 215, 253, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 242, 255, 0.1);
        }
        .phish-particle {
            position: absolute; width: 6px; height: 6px; background: #ff0055;
            border-radius: 50%; box-shadow: 0 0 10px #ff0055; pointer-events: none;
        }
        .action-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.65rem;
            padding: 0.95rem 1.5rem;
            border-radius: 0.9rem;
            border: 0;
            background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
            color: #ffffff;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            box-shadow: 0 12px 28px rgba(245, 115, 39, 0.35);
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }
        .action-btn:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #fb923c 0%, #f97316 100%);
            box-shadow: 0 16px 34px rgba(245, 115, 39, 0.45);
        }
        .action-btn:active {
            transform: translateY(1px);
            box-shadow: 0 8px 18px rgba(245, 115, 39, 0.25);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col p-4 md:p-6">

    <header class="mb-6 md:mb-8 border-l-4 border-cyan-600 pl-4">
        <h1 class="text-xl md:text-2xl font-black uppercase text-slate-900">Email Security <span class="text-cyan-600">&</span> Phishing Defense</h1>
        <p class="text-[9px] md:text-[10px] text-cyan-900 uppercase tracking-[0.3em]">Module 06 // Real-time Threat Mitigation</p>
    </header>

    <main class="flex-grow grid grid-cols-1 lg:grid-cols-12 gap-6 items-center max-w-7xl mx-auto w-full">

        <div class="col-span-1 lg:col-span-3 glass-panel p-6 rounded-2xl border-red-900/20 text-center relative h-48 lg:h-64 flex flex-col justify-center order-2 lg:order-1">
            <div class="text-4xl md:text-5xl mb-4 opacity-80">📧</div>
            <h4 class="text-red-500 font-bold text-xs uppercase tracking-wider">Incoming Phish</h4>
            <div class="mt-2 text-[9px] text-slate-600 font-mono">[SPOOFED_GATEWAY]</div>
        </div>

        <div class="col-span-1 lg:col-span-4 flex justify-center order-1 lg:order-2">
            <div id="shield-core" class="relative transition-all duration-500 scale-75 md:scale-100">
                <svg width="240" height="240" viewBox="0 0 200 200" class="md:w-[280px] md:h-[280px]">
                    <circle cx="100" cy="100" r="90" fill="none" stroke="rgba(0, 242, 255, 0.1)" stroke-width="1" stroke-dasharray="5 5"/>
                    <circle cx="100" cy="100" r="70" fill="none" stroke="rgba(0, 242, 255, 0.2)" stroke-width="15"/>
                    <text id="shield-status" x="50%" y="55%" text-anchor="middle" fill="#00f2ff" font-size="18" font-weight="900" class="uppercase">FILTER<br>ACTIVE</text>
                </svg>
            </div>
        </div>

        <div class="col-span-1 lg:col-span-5 space-y-4 order-3">
            <div class="glass-panel p-4 rounded-xl flex items-center gap-4 border-emerald-900/20">
                <span class="text-2xl">🖥️</span>
                <div class="flex-grow">
                    <div id="device-tag" class="text-[9px] bg-emerald-500/10 text-emerald-500 px-2 py-0.5 rounded inline-block font-bold">SYSTEM_SECURE</div>
                    <p class="text-[10px] text-slate-500 mt-1">Finance Node: 192.168.2.10</p>
                </div>
                <div class="text-[18px] opacity-40">🔒</div>
            </div>

            <div class="glass-panel rounded-xl overflow-hidden border-slate-800">
                <div class="bg-slate-900/50 px-3 py-1 border-b border-slate-800 text-[8px] text-slate-500 uppercase tracking-widest">Live Defense Log</div>
                <div id="log-box" class="h-32 lg:h-40 p-3 text-[10px] font-mono leading-relaxed overflow-y-auto space-y-1 text-slate-400">
                    <div>> Ready for inspection...</div>
                </div>
            </div>
        </div>
    </main>

    <div class="mt-6 md:mt-8 flex justify-center pb-6">
        <button id="main-btn" onclick="runSimulation()" class="action-btn w-full max-w-xs">
            Start Attack Simulation
        </button>
    </div>

    <script>
        function addLog(text, color = 'text-slate-500') {
            const logBox = document.getElementById('log-box');
            const entry = document.createElement('div');
            entry.className = color;
            entry.innerHTML = `> ${text}`;
            logBox.appendChild(entry);
            logBox.scrollTop = logBox.scrollHeight;
        }

        function runSimulation() {
            const btn = document.getElementById('main-btn');
            const shield = document.getElementById('shield-status');
            const device = document.getElementById('device-tag');

            btn.disabled = true;
            btn.style.opacity = '0.3';

            addLog('Incoming packet from untrusted source...', 'text-cyan-500');

            for(let i=0; i<12; i++) {
                setTimeout(() => {
                    const p = document.createElement('div');
                    p.className = 'phish-particle';
                    p.style.left = '20%';
                    p.style.top = '50%';
                    document.body.appendChild(p);
                    p.animate([{left:'20%'}, {left:'45%', opacity:0}], {duration: 600}).onfinish = () => p.remove();
                }, i * 80);
            }

            setTimeout(() => {
                addLog('CRITICAL: Malicious URL detected!', 'text-red-500 font-bold');
                addLog('Signature: Trojan.Phish.GEN', 'text-red-400');

                shield.innerHTML = "THREAT<br>BLOCKED";
                shield.setAttribute('fill', '#ff0055');

                device.innerText = "PHISHING_PREVENTED";
                device.classList.replace('text-emerald-500', 'text-red-500');
                device.classList.replace('bg-emerald-500/10', 'bg-red-500/10');

                setTimeout(() => {
                    shield.innerHTML = "FILTER<br>ACTIVE";
                    shield.setAttribute('fill', '#00f2ff');
                    addLog('System integrity verified. All clear.', 'text-emerald-500');
                    btn.disabled = false;
                    btn.style.opacity = '1';
                }, 2500);
            }, 800);
        }
    </script>
</body>
</html>
